name: 'Data CI'
description: 'CI/CD for analytics engineering — impact analysis, AI-powered SQL review, query cost estimation, lineage visualization, and test coverage reporting for dbt PRs'
author: 'Ayoade Adegbite'

branding:
  icon: 'bar-chart-2'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token for posting PR comments'
    required: true
    default: ${{ github.token }}
  project-dir:
    description: 'Path to the dbt project root (where dbt_project.yml lives)'
    required: false
    default: '.'
  manifest-path:
    description: 'Path to a pre-built manifest.json. If not provided, DataCI generates it automatically.'
    required: false
    default: ''
  dbt-version:
    description: 'dbt-core version to use for manifest generation (ignored if manifest-path is set)'
    required: false
    default: '1.9.0'
  fail-on-missing-tests:
    description: 'Fail the action if new models have no tests'
    required: false
    default: 'false'
  coverage-threshold:
    description: 'Minimum test coverage percentage (0-100). Action fails if below this.'
    required: false
    default: '0'

runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
    INPUT_PROJECT_DIR: ${{ inputs.project-dir }}
    INPUT_MANIFEST_PATH: ${{ inputs.manifest-path }}
    INPUT_DBT_VERSION: ${{ inputs.dbt-version }}
    INPUT_FAIL_ON_MISSING_TESTS: ${{ inputs.fail-on-missing-tests }}
    INPUT_COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
